  const t = document.getElementById('toast');

function fmtTime() {
  const n = new Date();

    from: fromPseudo,
    extra: extra || {},

}

function buildSidebar() {
  const nav2 = document.getElementById('sidebarNav');
  nav2.innerHTML = '';
  const isVip2    = CU && (isStaff() || CU.role === 'vip');
  const staff2    = CU && isStaff();
  const fonda2    = CU && (ROLES[CU.role]?.rank || 0) >= 12;
  const nameReqCount = nameChangeRequests.filter(r => r.status === 'pending').length;

  NAV_ITEMS.forEach(item => {
    if (item.staff    && !staff2)         return;
    if (item.staffOrVip && !staff2 && !isVip2) return;
    if (item.fonda    && !fonda2)         return;
    if (item.sep) {
      nav2.innerHTML += `<div class="sidebar-section">${item.sep}</div>`;
      return;
    }
    let badge = 0;
    if      (item.badge === 'reportCount')  badge = reportCount;
    else if (item.badge === 'nameReqCount') badge = nameReqCount;
    else if (item.badge)                    badge = item.badge;
    nav2.innerHTML += `<div class="sidebar-item" id="si-${item.id.replace(/[: ]/g,'-')}" onclick="handleNav('${item.id}')">
      ${item.icon || ''}
      <span style="flex:1">${item.label}</span>
      ${badge ? `<span class="sidebar-badge">${badge}</span>` : ''}
    </div>`;
  });

  const su = document.getElementById('sidebarUser');
  if (!CU) {
    su.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      <div><div class="sidebar-user-name">Non connecté</div></div>`;
  } else {
    const rd = ROLES[CU.role] || ROLES.membre;
    const inner = CU.avatar
      ? `<img src="${CU.avatar}" alt="">`
      : (CU.pseudo[0] || '?').toUpperCase();
    su.innerHTML = `<div class="av ${rd.avCls}" style="width:32px;height:32px;font-size:13px;color:${rd.color};flex-shrink:0">${inner}</div>
      <div style="flex:1;min-width:0">
        <div class="sidebar-user-name">${CU.pseudo}</div>
        <div style="font-size:10px;margin-top:1px">${rl(CU.role)}</div>
      </div>`;
  }
  updateNotifBadge();
}

function setSidebarActive(id) {
  document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('si-' + id.replace(/[: ]/g, '-'));
  if (el) el.classList.add('active');
}

function handleNav(id) {
  closeSidebar();
  if (id.startsWith('ch:')) {
    const parts = id.split(':');
    const name     = parts[1];
    const type     = parts[2];
    const perm     = parts[3] || null;
    const tags     = parts[4] === 'tags';
    const report   = parts[5] === 'report';
    const sanction = parts[5] === 'sanction';
    openCh(name, type, perm, tags, report, sanction);
  } else {
    nav(id);
  }
}

// =============================================
// NAVIGATION
// =============================================
function nav(view) {
  closeSidebar();
  setSidebarActive(view);
  const titles = {home:'Forums', profile:'Mon profil', admin:'Panneau Admin', logs:'Logs Staff', notifs:'Notifications'};
  const t = titles[view] || '';
  document.getElementById('topbarTitle').textContent = t;
  document.getElementById('mobileTitle').textContent = t;
  const ca = document.getElementById('contentArea');
  if      (view === 'home')    renderHome(ca);
  else if (view === 'profile') renderProfile(ca);
  else if (view === 'admin')   renderAdmin(ca);
  else if (view === 'logs')    { ca.innerHTML = '<div style="padding:24px"><div style="font-weight:800;font-size:16px;margin-bottom:16px">Logs Staff</div><div id="logsEl"></div></div>'; renderLogs(); }
  else if (view === 'notifs')  renderNotifs(ca);
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('mobileOverlay').classList.toggle('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('mobileOverlay').classList.remove('show');
}

function switchTab(tab) {
  document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById('form-login').style.display    = tab === 'login'    ? 'block' : 'none';
  document.getElementById('form-register').style.display = tab === 'register' ? 'block' : 'none';
}

function doLogin() {
  const loginKey = document.getElementById('loginUser').value.trim().toLowerCase();
  const pass     = document.getElementById('loginPass').value;
  const acc      = ACCOUNTS[loginKey];
  if (!acc)         { toast('Pseudo introuvable', false); return; }
  if (acc.pass !== pass) { toast('Mot de passe incorrect', false); return; }
  if (acc.role === 'banni') {
    const ban = banList.find(b => b.targetKey === loginKey);
    document.getElementById('bMod').textContent    = ban ? ban.actor  : 'Staff';
    document.getElementById('bReason').textContent = ban ? ban.reason : 'Non précisée';
    document.getElementById('bDate').textContent   = ban ? ban.date   : '—';
    document.getElementById('loginGate').style.display = 'none';
    document.getElementById('banScreen').classList.add('show');
    return;
  }
  CU = { loginKey, ...acc };
  document.getElementById('loginGate').style.display = 'none';
  buildSidebar();
  nav('home');
}

function doRegister() {
  const pseudo = document.getElementById('regPseudo').value.trim();
  const email  = document.getElementById('regEmail').value.trim();
  const pass   = document.getElementById('regPass').value;
  const pass2  = document.getElementById('regPass2').value;
  if (!pseudo || !email || !pass) { toast('Tous les champs sont requis', false); return; }
  if (pseudo.length < 3)          { toast('Pseudo trop court (min 3 caractères)', false); return; }
  if (pass.length < 6)            { toast('Mot de passe trop court (min 6 caractères)', false); return; }
  if (pass !== pass2)             { toast('Les mots de passe ne correspondent pas', false); return; }
  if (!email.includes('@'))       { toast('Email invalide', false); return; }
  const loginKey = pseudo.toLowerCase();
  if (ACCOUNTS[loginKey])         { toast('Ce pseudo est déjà pris', false); return; }
  ACCOUNTS[loginKey] = {
    pseudo, pass, role: 'membre',
    msgs: 0, posts: 0,
    joined: new Date().toLocaleDateString('fr-FR'),
    bio: '', avatar: null
  };
  CU = { loginKey, ...ACCOUNTS[loginKey] };
  document.getElementById('loginGate').style.display = 'none';
  buildSidebar();
  nav('home');
  toast(`Bienvenue ${pseudo} !`);
}

function logout() {
  CU = null;
  buildSidebar();
  document.getElementById('loginGate').style.display = 'flex';
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPass').value = '';
}

function buildCatBlocks() {
  let html = '';
  const cats = [...CAT_DEFS];
  if (CU && (isStaff() || CU.role === 'vip')) cats.push(VIP_CAT);
  if (CU && isStaff()) cats.push(STAFF_CAT);
  cats.forEach(cat => {
    const vs = cat.vip ? 'border-color:rgba(232,184,64,.25);' : '';
    const hs = cat.vip ? 'background:linear-gradient(90deg,rgba(232,184,64,.05),var(--bg2));' : '';
    const ns = cat.vip ? 'color:var(--gold);' : '';
    html += `<div class="cat-block" style="${vs}"><div class="cat-head" style="${hs}"><div class="cat-head-name" style="${ns}">${cat.name}</div></div>`;
    cat.channels.forEach(c => {
      const isReport   = !!c.report;
      const isSanction = c.type === 'sanction';
      const isValnom   = c.type === 'valnom';
      const lastArr = c.type === 'discussion' || c.type === 'sanction' || c.type === 'valnom' ? (msgs[c.ch] || []) : null;
      const lastPost = !lastArr ? ((posts[c.ch] || []).slice(-1)[0]) : null;
      let lastTxt = '';
      if (lastArr && lastArr.length) {
        const m = lastArr[lastArr.length - 1];
        lastTxt = `${m.author} : "${(m.content || '').replace(/<[^>]+>/g,'').slice(0,40)}"`;
      } else if (lastPost) {
        lastTxt = lastPost.title || '';
      } else {
        lastTxt = 'Aucun message';
      }
      html += `<div class="ch-row" onclick="openCh('${c.ch}','${c.type}','${c.perm||''}',${!!c.tags},${isReport},${isSanction})">
<div class="ch-icon-wrap">${c.icon}</div>
<div style="min-width:0"><div class="ch-name">${c.ch}</div><div class="ch-last">${lastTxt}</div></div>
<div></div>
</div>`;
    });
    html += '</div>';
  });
  return html;
}

function openCh(name, type, perm, hasTags, isReport, isSanction) {
  curCh        = name;
  curType      = type;
  curPerm      = perm || null;
  curTags      = !!hasTags;
  curIsReport  = !!isReport;
  curIsSanction= !!isSanction;
  document.getElementById('topbarTitle').textContent = name;
  document.getElementById('mobileTitle').textContent  = name;
  setSidebarActive('ch:' + name + ':' + type + (perm ? ':' + perm : ''));
  if (type === 'post' || type === 'post-own') renderPostList();
  else if (type === 'valnom') renderValnom();
  else if (type === 'sanction') renderSanction();
  else renderDisc(); // discussion + report
}

function setTag(i, tag) {
  if (!isStaff()) return;
  posts[curCh][i].tag = tag;
  addLog('TAG', CU.pseudo, CU.role, posts[curCh][i].author, tag);
  openPost(i);
  toast('Tag : ' + tag);
}
function delPost(i)        { posts[curCh].splice(i, 1); renderPostList(); toast('Post supprimé'); }
function delReply(pi, ri)  { posts[curCh][pi].replies.splice(ri, 1); openPost(pi); toast('Réponse supprimée'); }

function submitReply(i) {
  const ed = document.getElementById('replyEd');
  if (!ed || !ed.innerHTML.trim()) { toast('Réponse vide', false); return; }
  const content = parsePings(ed.innerHTML);
  posts[curCh][i].replies.push({ author: CU.pseudo, role: CU.role, content, time: fmtTime() });
  const op = posts[curCh][i].author;
  if (op !== CU.pseudo) addNotif(op, 'reply', `${CU.pseudo} a répondu à votre post "${posts[curCh][i].title.slice(0,30)}"`, CU.pseudo, {ch: curCh});
  openPost(i);
  toast('Réponse publiée !');
}

function openNP(tagOnly) {
  tagPickIdx = tagOnly ? tagPickIdx : null;
  _selTag = null;
  document.getElementById('npTitleWrap').style.display  = tagOnly ? 'none' : 'block';
  document.getElementById('npTagArea').style.display    = (curTags || tagOnly) ? 'block' : 'none';
  document.getElementById('npTitle').value              = '';
  document.getElementById('npContent').innerHTML        = '';
  document.getElementById('ccCount').textContent        = '0 car.';
  document.querySelectorAll('.tsel').forEach(e => e.classList.remove('sel'));
  openMo('mNewPost');
}
function openTagFor(i) { tagPickIdx = i; openNP(true); }
function pickTag(el) {
  document.querySelectorAll('.tsel').forEach(e => e.classList.remove('sel'));
  el.classList.add('sel');
  _selTag = el.dataset.tag;
}
function submitPost() {
  if (tagPickIdx !== null) {
    if (_selTag && posts[curCh][tagPickIdx]) {
      posts[curCh][tagPickIdx].tag = _selTag;
      addLog('TAG', CU.pseudo, CU.role, posts[curCh][tagPickIdx].author, _selTag);
    }
    closeMo('mNewPost'); renderPostList(); toast('Tag appliqué'); return;
  }
  const title   = document.getElementById('npTitle').value.trim();
  const content = parsePings(document.getElementById('npContent').innerHTML.trim());
  if (!title) { toast('Titre requis', false); return; }
  if (!posts[curCh]) posts[curCh] = [];
  posts[curCh].unshift({ id: Date.now(), author: CU.pseudo, role: CU.role, title, content: content || '(Vide)', time: fmtTime(), replies: [], tag: _selTag || null });
  if (CU.posts != null) CU.posts++;
  closeMo('mNewPost'); renderPostList(); toast('Post publié !');
}
function updateCC() {
  const el = document.getElementById('npContent');
  const cc = document.getElementById('ccCount');
  if (el && cc) cc.textContent = (el.innerText || '').length + ' car.';
}
function ec(cmd, val) {
  const ed = document.getElementById('npContent');
  if (ed) { ed.focus(); document.execCommand(cmd, false, val || null); }
  updateCC();
}

function showMsgMenu(e, i, cd, cr) {
  e.stopPropagation(); closeAllMenus();
  const m    = (msgs[curCh] || [])[i];

  // Répondre (toujours)
  const repBtn = document.createElement('div'); repBtn.className = 'mm-item';
  repBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 17 4 12 9 7"/><path d="M20 18v-2a4 4 0 00-4-4H4"/></svg>Répondre`;
  repBtn.onclick = () => { setReply(i); closeAllMenus(); };
  menu.appendChild(repBtn);
  // Supprimer
  if (cd) {
    const del = document.createElement('div'); del.className = 'mm-item danger';
    del.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>Supprimer`;
    del.onclick = () => { delMsg(i); closeAllMenus(); };
    menu.appendChild(del);
    // Bannir (admin+)
    if (m && CU && (ROLES[CU.role]?.rank || 0) >= 10) {
      const banBtn = document.createElement('div'); banBtn.className = 'mm-item danger';
      banBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>Bannir ${m.author}`;
      banBtn.onclick = () => { quickBan(m.author); closeAllMenus(); };
      menu.appendChild(banBtn);
    }
  }
  // Signaler
  if (cr) {
    const sigBtn = document.createElement('div'); sigBtn.className = 'mm-item';
    sigBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg>Signaler`;

function submitReport() {

  const m       = (msgs[curCh] || [])[repIdx];
  const target  = m ? m.author : 'inconnu';

function delMsg(i) {
  const tgt = (msgs[curCh] || [])[i]?.author || '?';
  (msgs[curCh] || []).splice(i, 1);
  addLog('SUPPRESSION MSG', CU.pseudo, CU.role, tgt, 'Modération');
  renderMsgs(); toast('Message supprimé');
}

function sendMsg() {
  const ed = document.getElementById('msgEd');
  if (!ed || !ed.innerHTML.trim()) return;
  if (!CU) { toast('Connectez-vous', false); return; }
  if (!msgs[curCh]) msgs[curCh] = [];
  const content = parsePings(ed.innerHTML);
  const msgObj  = { id: Date.now(), author: CU.pseudo, role: CU.role, content, time: fmtTime(), replyTo: replyTarget ? replyTarget.msgIdx : null };
  msgs[curCh].push(msgObj);
  if (replyTarget) {
    const orig = (msgs[curCh] || [])[replyTarget.msgIdx];
    if (orig && orig.author !== CU.pseudo) addNotif(orig.author, 'reply', `${CU.pseudo} a répondu à votre message dans #${curCh}`, CU.pseudo, { ch: curCh });

}

function handleBotCmd() {
  const ed  = document.getElementById('cmdEd');
  if (!ed || !ed.innerText.trim()) return;
  const raw = ed.innerText.trim();
  ed.innerHTML = '';
  if (!msgs['Sanction Joueur']) msgs['Sanction Joueur'] = [];
  const ms = msgs['Sanction Joueur'];

  if (raw.startsWith('!warn ')) {
    const pseudo = raw.slice(6).trim();
    if (!pseudo) { toast('Usage : !warn <pseudo>', false); return; }
    const reason = prompt(`Raison du warn pour ${pseudo} ?`);
    if (!reason) return;
    if (!sanctions[pseudo]) sanctions[pseudo] = [];
    sanctions[pseudo].push({ type:'WARN', by:CU.pseudo, reason, duration:'—', time:fmtTime() });
    addLog('WARN', CU.pseudo, CU.role, pseudo, reason);
    ms.push({ id:Date.now(), isBotEmbed:true, embed:{type:'warn', title:`⚠️ WARN — ${pseudo}`,
      fields:[{k:'Joueur',v:pseudo},{k:'Staff',v:CU.pseudo},{k:'Raison',v:reason},{k:'Date',v:fmtTime()}]}, time:fmtTime() });
    renderSanction(); toast(`Warn enregistré pour ${pseudo}`);

  } else if (raw.startsWith('!ban ')) {
    const pseudo = raw.slice(5).trim();
    if (!pseudo) { toast('Usage : !ban <pseudo>', false); return; }
    const reason   = prompt(`Raison du ban pour ${pseudo} ?`);
    if (!reason) return;
    const duration = prompt('Durée ? (ex : 7 jours, Permanent)');
    if (!duration) return;
    if (!confirm(`Bannir ${pseudo} [${duration}] pour : ${reason} ?`)) return;
    if (!sanctions[pseudo]) sanctions[pseudo] = [];
    sanctions[pseudo].push({ type:'BAN', by:CU.pseudo, reason, duration, time:fmtTime() });
    addLog('BAN ROBLOX', CU.pseudo, CU.role, pseudo, `${reason} | ${duration}`);
    ms.push({ id:Date.now(), isBotEmbed:true, embed:{type:'ban', title:`🔨 BAN — ${pseudo}`,
      fields:[{k:'Joueur',v:pseudo},{k:'Staff',v:CU.pseudo},{k:'Durée',v:duration},{k:'Raison',v:reason},{k:'Date',v:fmtTime()}]}, time:fmtTime() });
    renderSanction(); toast(`${pseudo} banni (${duration})`);

  } else if (raw.startsWith('!casiers ')) {
    const pseudo = raw.slice(9).trim();
    if (!pseudo) { toast('Usage : !casiers <pseudo>', false); return; }
    const cas = sanctions[pseudo] || [];
    let fields;
    if (!cas.length) {
      fields = [{k:'Statut', v:`✅ ${pseudo} n'a aucun casier.`}];
    } else {
      fields = [{k:'Joueur',v:pseudo},{k:'Total',v:cas.length+' sanction(s)'}];
      cas.forEach((s, idx) => fields.push({k:`#${idx+1} — ${s.type}`, v:`Par ${s.by} | ${s.time}<br>Raison : ${s.reason} | Durée : ${s.duration}`}));
    }
    ms.push({ id:Date.now(), isBotEmbed:true, embed:{type:'casier', title:`📋 Casier — ${pseudo}`, fields}, time:fmtTime() });
    renderSanction();

  } else if (raw.startsWith('!modifcasiers ')) {
    if ((ROLES[CU.role]?.rank || 0) < 11) { toast('Accès refusé — Réservé Fonda/Co-Fonda/Manager', false); return; }
    const pseudo = raw.slice(14).trim();
    const cas    = sanctions[pseudo];
    if (!cas || !cas.length) { toast(`Aucun casier pour ${pseudo}`, false); return; }
    const input = prompt(`Casier de ${pseudo} (${cas.length} sanction(s))\nEntrez le numéro à supprimer (1–${cas.length}) :`);
    if (!input) return;
    const idx = parseInt(input) - 1;
    if (isNaN(idx) || idx < 0 || idx >= cas.length) { toast('Numéro invalide', false); return; }
    sanctions[pseudo].splice(idx, 1);
    addLog('MODIF CASIER', CU.pseudo, CU.role, pseudo, `Suppression sanction #${idx+1}`);
    toast(`Sanction #${idx+1} supprimée`);
    renderSanction();

  } else {
    toast('Commande inconnue. Essayez !warn, !ban, !casiers, !modifcasiers', false);
  }
}

function saveProf() {
  const newPseudo = document.getElementById('editPseudo').value.trim();
  const bio       = document.getElementById('editBio').value.trim();
  if (!newPseudo) { toast('Pseudo requis', false); return; }
  // Sauvegarder avatar et bio immédiatement
  if (CU._tempAv) {
    CU.avatar = CU._tempAv;
    ACCOUNTS[CU.loginKey].avatar = CU.avatar;
    delete CU._tempAv;
  }
  CU.bio = bio;
  ACCOUNTS[CU.loginKey].bio = bio;
  // Changement de pseudo → demande de validation
  if (newPseudo !== CU.pseudo) {
    const req = { id: 'nc_' + Date.now(), loginKey: CU.loginKey, oldPseudo: CU.pseudo, newPseudo, time: fmtTime(), status: 'pending' };
    nameChangeRequests.push(req);
    buildSidebar();
    toast('Demande de changement de pseudo envoyée aux staff !');
  } else {
    toast('Profil mis à jour !');
  }
  closeMo('mEditProfile'); renderProfile(); buildSidebar();
}

function renderNotifs(ca) {
  if (CU) notifsList.filter(n => n.to === CU.pseudo).forEach(n => n.read = true);
  updateNotifBadge();
  const mine = notifsList.filter(n => n.to === CU.pseudo);
  const iconFor = type => type === 'ping' ? '@' : type === 'reply' ? '↩' : '✓';

  <div style="width:32px;height:32px;border-radius:50%;background:${colorFor(n.type)}22;border:1px solid ${colorFor(n.type)}55;display:flex;align-items:center;justify-content:center;font-weight:900;color:${colorFor(n.type)};flex-shrink:0">${iconFor(n.type)}</div>

  <div class="admin-card-btn" onclick="nav('logs')"><svg viewBox="0 0 24 24" fill="none" stroke="#88ccff" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><div class="admin-card-btn-label">Logs</div></div>
</div>

  <div class="sec-title">Membres inscrits (${Object.keys(ACCOUNTS).length})</div>

function confirmBan() {
  const targetPseudo = document.getElementById('banTarget').value.trim();
  const reason       = document.getElementById('banReason').value.trim() || 'Aucune raison';
  if (!targetPseudo) { toast('Pseudo requis', false); return; }
  const key = Object.keys(ACCOUNTS).find(k => ACCOUNTS[k].pseudo === targetPseudo || k === targetPseudo.toLowerCase());
  if (key) ACCOUNTS[key].role = 'banni';
  if (!banList.find(b => b.targetPseudo === targetPseudo)) {
    banList.push({ targetPseudo, targetKey: key || null, reason, actor: CU.pseudo, date: new Date().toLocaleDateString('fr-FR') });
  }
  addLog('BAN FORUM', CU.pseudo, CU.role, targetPseudo, reason);
  closeMo('mBan');
  document.getElementById('banTarget').value = '';
  document.getElementById('banReason').value = '';
  updateBanList(); toast(targetPseudo + ' banni !');
}

function doUnban() {
  const t = prompt('Pseudo à débannir :'); if (!t) return;
  const i = banList.findIndex(b => b.targetPseudo === t); if (i >= 0) banList.splice(i, 1);
  const key = Object.keys(ACCOUNTS).find(k => ACCOUNTS[k].pseudo === t || k === t.toLowerCase());
  if (key) ACCOUNTS[key].role = 'membre';
  addLog('DEBAN', CU.pseudo, CU.role, t, 'Débanni'); updateBanList(); toast(t + ' débanni !');
}

function updateBanList() {
  const el = document.getElementById('banListEl'); if (!el) return;
  if (!banList.length) { el.innerHTML = '<div style="padding:14px;text-align:center;color:var(--text3)">Aucun banni.</div>'; return; }
  el.innerHTML = banList.map(b => `<div class="mt-row">
<div class="av av-b-banni" style="width:36px;height:36px;font-size:18px">🚫</div>
<div><div style="font-weight:700;font-size:13px">${b.targetPseudo}</div><div style="font-size:11px;color:var(--red);margin-top:2px">Par ${b.actor} · ${b.reason}</div></div>
<div></div>
<div><button class="mt-btn mt-btn-unban" onclick="unbanSpec('${b.targetPseudo}','${b.targetKey||''}')">Débannir</button></div>
</div>`).join('');
}

function unbanSpec(pseudo, key) {
  const i = banList.findIndex(b => b.targetPseudo === pseudo); if (i >= 0) banList.splice(i, 1);
  if (key && ACCOUNTS[key]) ACCOUNTS[key].role = 'membre';
  addLog('DEBAN', CU.pseudo, CU.role, pseudo, 'Débanni depuis le panneau'); updateBanList(); toast(pseudo + ' débanni');
}

function quickBan(pseudo, key) {
  document.getElementById('banTarget').value = pseudo;
  openMo('mBan');
}

function openRoleFor(key) {
  document.getElementById('roleTarget').value = key;
  openMo('mRole');
}

function confirmRole() {
  const key  = document.getElementById('roleTarget').value.trim().toLowerCase();
  const role = document.getElementById('roleSelect').value;
  if (!key || !ACCOUNTS[key]) { toast('Login introuvable', false); return; }
  ACCOUNTS[key].role = role;
  if (CU && CU.loginKey === key) CU.role = role;
  addLog('ROLE', CU.pseudo, CU.role, ACCOUNTS[key].pseudo, '→ ' + (ROLES[role]?.label || role));
  closeMo('mRole'); buildSidebar(); toast('Rôle mis à jour');
}

// =============================================
// LOGS
// =============================================
const LOG_COLORS = {'BAN FORUM':'#ff6666','BAN ROBLOX':'#ff4444','DEBAN':'#66ff88','SUPPRESSION MSG':'#f0c040','TAG':'#88ccff','ROLE':'#cc88ff','WARN':'#f0c040','MODIF CASIER':'#aaaaff'};

function addLog(action, actor, actorRole, target, reason) {
  logsList.unshift({ time: fmtTime(), action, actor, actorRole, target, reason });
}

function renderLogs() {
  const el = document.getElementById('logsEl'); if (!el) return;
  el.innerHTML = logsList.length
    ? logsList.map(l => `<div class="log-entry">
<span style="color:var(--text3)">[${l.time}]</span>
<span style="color:${LOG_COLORS[l.action]||'var(--red)'}"> ${l.action}</span>
&nbsp;·&nbsp; par <strong style="color:${rc(l.actorRole)}">${l.actor}</strong>
&nbsp;·&nbsp; cible : <span style="color:var(--blue)">${l.target}</span>
&nbsp;·&nbsp; <span style="color:var(--text2)">${l.reason}</span>
</div>`).join('')
    : '<div style="padding:20px;text-align:center;color:var(--text3)">Aucun log.</div>';
}

  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('mobileOverlay').classList.toggle('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('mobileOverlay').classList.remove('show');
}
